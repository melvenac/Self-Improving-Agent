# Example GitHub Actions workflow for Playwright E2E tests
#
# USAGE:
#   1. Copy this file to `.github/workflows/e2e.yml` in your project
#   2. Update the `working-directory` if your app isn't in the repo root
#   3. Update the Node version if needed
#   4. Ensure `playwright.config.ts` exists in your project root
#   5. Commit and push — tests will run on every PR and push to main
#
# This pairs with the framework's zero-token testing strategy:
#   - AI writes .spec.ts files during development (via /test or playwright-tester skill)
#   - This CI workflow runs them automatically on every push/PR
#   - Zero AI tokens consumed in CI — just native Playwright execution

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Uncomment if you need a dev server running during tests
      # (playwright.config.ts webServer config handles this automatically,
      #  but some setups need the server started separately)
      #
      # - name: Start dev server
      #   run: npm run dev &
      #   env:
      #     # Add any env vars your dev server needs
      #     DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run E2E tests
        run: npx playwright test tests/e2e/
        env:
          CI: true
          # Add any env vars your app needs at test time
          # NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
